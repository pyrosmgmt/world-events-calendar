    confidence: high
    last_verified: "2026-07-21"
    notes: "No official tentpole feed. sporting-events.org verified live but per-sport/global + gaps. Curate ~30-40 UK marquees (Wimbledon, Ascot, Grand National, Six Nations, The Open, Ashes, London Marathon, British GP, FA Cup Final)."
  - category: us-sporting
    provider: "Custom curated (seed: ESPN public API + official event sites)"
