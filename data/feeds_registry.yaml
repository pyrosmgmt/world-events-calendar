# Pyros World Events Calendar — Feed Registry (single source of truth)
#
# One entry per category. `strategy` is how that calendar is produced:
#   subscribe = official/third-party auto-updating .ics we subscribe to (zero maintenance)
#   custom    = we generate it from data/events.yaml (yearly refresh)
#   hybrid    = a subscribe feed as backbone + custom top-up
#
# `url` (when present) is a VERIFIED-LIVE feed (fetched HTTP 200 + valid VCALENDAR
# during research on 2026-07-21). check_liveness.py re-verifies these.
# Rejected/unverified candidates are documented in research/<category>.md.

meta:
  verified_on: "2026-07-21"
  window: "2026-07-21 to 2027-12-31 (extended to end of 2027)"
  granularity: "broad tentpole events (tournament/season/marquee level)"

feeds:
  # ---------------- Zero-maintenance official subscriptions ----------------
  - category: holidays-awareness
    provider: "Google Official — UK Holidays"
    url: "https://calendar.google.com/calendar/ical/en.uk%23holiday%40group.v.calendar.google.com/public/basic.ics"
    strategy: subscribe
    official: true
    price: free
    cadence: auto (zero maintenance)
    confidence: high
    last_verified: "2026-07-21"
    notes: "244 events through 2031; includes cultural tentpoles (Valentine's, Halloween, NYE, Black Friday). Pair with US feed + curated awareness days."
  - category: holidays-awareness
    provider: "Google Official — US Holidays"
    url: "https://calendar.google.com/calendar/ical/en.usa%23holiday%40group.v.calendar.google.com/public/basic.ics"
    strategy: subscribe
    official: true
    price: free
    cadence: auto (zero maintenance)
    confidence: high
    last_verified: "2026-07-21"
    notes: "317 events through 2031."
  - category: holidays-awareness
    provider: "gov.uk Bank Holidays (JSON) — validation source"
    url: "https://www.gov.uk/bank-holidays.json"
    strategy: reference
    official: true
    price: free
    cadence: auto
    confidence: high
    last_verified: "2026-07-21"
    notes: "Authoritative UK cross-check (JSON, not .ics)."

  - category: combat-sports
    provider: "clarencechaan/ufc-cal (UFC, scraped from ufc.com)"
    url: "https://raw.githubusercontent.com/clarencechaan/ufc-cal/ics/UFC.ics"
    strategy: subscribe
    official: false
    price: free
    cadence: "auto (updated multiple times daily)"
    confidence: high
    last_verified: "2026-07-21"
    notes: "One entry per card (PPV + Fight Night) — perfect tentpole granularity. Boxing/crossover handled as custom (no reliable feed)."

